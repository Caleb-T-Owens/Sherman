name: cap

services:
    cap-web:
        image: ghcr.io/capsoftware/cap-web:latest
        restart: unless-stopped
        depends_on:
            mysql:
                condition: service_healthy
            minio:
                condition: service_healthy
            minio-setup:
                condition: service_completed_successfully
        environment:
            DATABASE_URL: mysql://cap:${MYSQL_PASSWORD:?set MYSQL_PASSWORD}@mysql:3306/cap
            WEB_URL: ${CAP_URL:-https://cap.cto.je}
            NEXTAUTH_URL: ${CAP_URL:-https://cap.cto.je}
            DATABASE_ENCRYPTION_KEY: ${DATABASE_ENCRYPTION_KEY:?set DATABASE_ENCRYPTION_KEY}
            NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET}
            MEDIA_SERVER_WEBHOOK_SECRET: ${MEDIA_SERVER_WEBHOOK_SECRET:?set MEDIA_SERVER_WEBHOOK_SECRET}
            CAP_AWS_ACCESS_KEY: ${MINIO_ROOT_USER:-cap}
            CAP_AWS_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
            CAP_AWS_BUCKET: ${S3_BUCKET:-cap}
            CAP_AWS_REGION: us-east-1
            S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_URL:-https://files-cap.cto.je}
            S3_INTERNAL_ENDPOINT: http://minio:9000
            S3_PATH_STYLE: "true"
            RESEND_API_KEY: ${RESEND_API_KEY:-}
            RESEND_FROM_DOMAIN: ${RESEND_FROM_DOMAIN:-}
            MEDIA_SERVER_URL: http://media-server:3456
            MEDIA_SERVER_WEBHOOK_URL: http://cap-web:3000
            GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
            GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
            DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
            GROQ_API_KEY: ${GROQ_API_KEY:-}
            OPENAI_API_KEY: ${OPENAI_API_KEY:-}
        ports:
            - "127.0.0.1:${CAP_PORT:-3015}:3000"
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "-q",
                    "-O",
                    "/dev/null",
                    "http://127.0.0.1:3000/",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s
        networks:
            - cap-network

    media-server:
        image: ghcr.io/capsoftware/cap-media-server:latest
        restart: unless-stopped
        environment:
            PORT: 3456
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://localhost:3456/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
        networks:
            - cap-network

    mysql:
        image: mysql:8.0
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: cap
            MYSQL_USER: cap
            MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
        command:
            - --max_connections=1000
            - --default-authentication-plugin=mysql_native_password
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
        volumes:
            - ${HOME}/volumes/cap/mysql:/var/lib/mysql
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-u",
                    "cap",
                    "-p${MYSQL_PASSWORD}",
                ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s
        networks:
            - cap-network

    minio:
        image: minio/minio:latest
        restart: unless-stopped
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cap}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
        ports:
            - "127.0.0.1:${MINIO_PORT:-9015}:9000"
            - "127.0.0.1:${MINIO_CONSOLE_PORT:-9016}:9001"
        volumes:
            - ${HOME}/volumes/cap/minio:/data
        healthcheck:
            test: ["CMD", "mc", "ready", "local"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
        networks:
            - cap-network

    minio-setup:
        image: minio/mc:latest
        depends_on:
            minio:
                condition: service_healthy
        entrypoint: >
            /bin/sh -c "
            mc alias set capminio http://minio:9000 $${MINIO_ROOT_USER:-cap} $${MINIO_ROOT_PASSWORD};
            mc mb capminio/$${S3_BUCKET:-cap} --ignore-existing;
            mc anonymous set download capminio/$${S3_BUCKET:-cap};
            exit 0;
            "
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cap}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
            S3_BUCKET: ${S3_BUCKET:-cap}
        networks:
            - cap-network

networks:
    cap-network:
        driver: bridge
